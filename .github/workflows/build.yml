name: Build

on:
  pull_request:
    branches:
    - '*'
  push:
    branches:
    - '*'
  release:
    types:
      - published

defaults:
  run:
    shell: bash -l {0}


jobs:
  build:
    name: Build ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
#        os: ['ubuntu-latest', 'macos-latest', 'windows-latest']
        os: [ 'windows-latest']
        python-version: ['3.10']

    steps:
    - name: Check out
      uses: actions/checkout@v2

    - uses: conda-incubator/setup-miniconda@v2
      with:
        channels: conda-forge
        miniforge-version: latest
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        activate-environment: test
        environment-file: ./.github/environment.yml

    - name: Install
      run: SKBUILD_CONFIGURE_OPTIONS="-DWITH_TESTS=ON" pip install -e .

    - name: Test
      shell: cmd /C CALL {0}
      run: |
        set PYTHONHOME=%CONDA_PREFIX%
        echo "conda prefix %CONDA_PREFIX%"
        set PDAL_DRIVER_PATH= python -c "import os, skbuild; print(os.path.join(skbuild.constants.SKBUILD_DIR(), 'cmake-build'))"
        echo %PDAL_DRIVER_PATH%
        dir %PDAL_DRIVER_PATH%
        gdalinfo --version
        pdal --drivers
        pdal --version
        echo %PATH%
        dir %PDAL_DRIVER_PATH%/pdal_filters_python_test.exe
        dir %PDAL_DRIVER_PATH%/pdal_io_numpy_test.exe

        %PDAL_DRIVER_PATH%/pdal_filters_python_test.exe
        %PDAL_DRIVER_PATH%/pdal_io_numpy_test.exe



  dist:
    name: Distribution
    needs: [build]

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: ['ubuntu-latest']
        python-version: ['3.9']

    steps:
    - uses: actions/checkout@v2
    - uses: conda-incubator/setup-miniconda@v2
      with:
        channels: conda-forge
        python-version: ${{ matrix.python-version }}
        mamba-version: "*"

    - name: Dependencies
      shell: bash -l {0}
      run: mamba install --yes --quiet -c conda-forge scikit-build numpy python=${{ matrix.python-version }} pybind11 pdal

    - name: sdist
      shell: bash -l {0}
      run: |
        python setup.py sdist
        ls dist

    - uses: pypa/gh-action-pypi-publish@master
      name: Publish package
      if: github.event_name == 'release' && github.event.action == 'published'
      with:
        user: __token__
        password: ${{ secrets.pypi_token }}
        packages_dir: ./dist
